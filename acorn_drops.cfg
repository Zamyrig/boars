# acorn_drops.cfg — таблицы дропов для фермы
# Формат секции [item_id]:
#   grow_time_hours = N              — время роста в часах
#   drop = acorns,chance,coins_min,coins_max
#       acorns  — кол-во желудей (acorn)
#       chance  — шанс в % (сумма всех drop ≈ 100)
#       coins_min/max — диапазон монет (выбирается случайно)
#   drop_plant_acorn_chance = X.X   — шанс выпадения 1 ростка (plant_acorn) в %
#
# Цены продажи (используются для расчёта EV):
#   acorn        = 150 монет
#   plant_acorn  = 800 монет
#
# EV рассчитан при стоимости ростка 1000 монет (покупка)
# -----------------------------------------------------------------------

[plant_acorn]
# Росток (plant_acorn). Стоимость покупки: 1000. EV: ~1284 монет (x1.28)
# Среднее кол-во желудей с одного сбора: ~7.8 шт.
grow_time_hours = 1

# плохой лот — 30% суммарно
drop = 4,5,50,100
drop = 5,10,50,100
drop = 6,15,50,100

# хороший лот — ~70% суммарно
drop = 7,20,130,180
drop = 8,18,115,165
drop = 9,12,100,150
drop = 10,8,85,135
drop = 11,5,70,120
drop = 12,3,55,105
drop = 13,2,50,90
drop = 14,1,50,75
drop = 15,0.5,50,60

# джекпот (редкий)
drop = 18,0.2,50,60
drop = 20,0.1,50,60

# шанс бонусного ростка (plant_acorn) в %
drop_plant_acorn_chance = 1.0
